# Конфигурация Nginx для UTEAM
# Установите в: /etc/nginx/sites-available/uteam
# И создайте симлинк: ln -s /etc/nginx/sites-available/uteam /etc/nginx/sites-enabled/uteam

# Upstream для Node.js сервера
upstream uteam_server {
    server localhost:3001;
    keepalive 64;
}

# Редирект с HTTP на HTTPS (после получения SSL сертификата)
# server {
#     listen 80;
#     server_name 72.56.236.196;
#     return 301 https://$server_name$request_uri;
# }

# HTTPS конфигурация (после получения SSL сертификата)
# server {
#     listen 443 ssl http2;
#     server_name 72.56.236.196;
#
#     ssl_certificate /etc/letsencrypt/live/72.56.236.196/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/72.56.236.196/privkey.pem;
#
#     # ... остальная конфигурация ниже ...
# }

# HTTP конфигурация (временно, до получения SSL)
server {
    listen 80;
    server_name 72.56.236.196;
    
    # Максимальный размер загруженного файла (500MB)
    client_max_body_size 500M;
    
    # Буферы для больших запросов
    client_body_buffer_size 128k;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Логи
    access_log /var/log/nginx/uteam-access.log combined;
    error_log /var/log/nginx/uteam-error.log warn;

    # Корневой путь - информационная страница
    location / {
        return 200 'UTEAM API Server Running\n';
        add_header Content-Type text/plain;
    }

    # API маршруты
    location /api {
        proxy_pass http://uteam_server;
        proxy_http_version 1.1;
        
        # Заголовки для правильной работы
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Кэширование
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket поддержка для Socket.io
    location /socket.io {
        proxy_pass http://uteam_server/socket.io;
        proxy_http_version 1.1;
        proxy_buffering off;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Большие таймауты для WebSocket
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Загруженные файлы (игры, скриншоты, аватары)
    location /uploads {
        alias /var/www/uteam/server/uploads;
        
        # Кэширование загруженных файлов
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        
        # Гжип компрессия
        gzip on;
        gzip_types text/* application/json;
        
        # Доступ к директориям запрещен
        location ~ /uploads/\.git {
            deny all;
        }
    }

    # Защита от частых запросов (rate limiting)
    location /api/auth/login {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://uteam_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Запрет доступа к чувствительным файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Rate limiting для защиты от DDoS
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
