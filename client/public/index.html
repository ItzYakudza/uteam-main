<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1b2838" />
    <meta name="description" content="UTEAM - Игровая платформа" />
    <title>UTEAM</title>
    <style>
        /* Начальный стиль загрузки */
        body {
            margin: 0;
            padding: 0;
            background-color: #1b2838;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #root {
            min-height: 100vh;
        }
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #c7d5e0;
        }
        .loading-logo {
            font-size: 48px;
            font-weight: bold;
            color: #66c0f4;
            margin-bottom: 20px;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a475e;
            border-top-color: #66c0f4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <div class="loading-logo">UTEAM</div>
            <div class="loading-spinner"></div>
        </div>
    </div>
</body>
</html>
